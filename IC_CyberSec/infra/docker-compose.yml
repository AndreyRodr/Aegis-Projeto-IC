version: '3.8'

services:
  juice-shop:
    image: bkimminich/juice-shop
    container_name: alvo_juice_shop
    restart: always
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    container_name: proxy_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs_nginx:/var/log/nginx
    depends_on:
      - juice-shop

  # --- FASE 2: PIPELINE DE DADOS (ELK) ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: banco_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Desativa a exigência de senha para facilitar o ambiente local
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Limita o uso de memória RAM do seu notebook
    ports:
      - "9201:9200"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.1
    container_name: pipeline_logstash
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logs_nginx:/var/log/nginx:ro # O Logstash vai ler a mesma pasta que o Nginx está gravando
    depends_on:
      - elasticsearch
      
# --- FASE 3: VISUALIZAÇÃO (DASHBOARDS) ---
  grafana:
    image: grafana/grafana:latest
    container_name: painel_grafana
    restart: always
    ports:
      - "3001:3000" 
    depends_on:
      - elasticsearch